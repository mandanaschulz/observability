[SERVICE]
    flush               1
    storage.path        /var/log/fluent-bit/storage
    storage.sync         normal
    storage.checksum     off
    storage.max_chunks_up 128
    http_server          On
    http_listen          0.0.0.0
    http_port            2020
    Parsers_File        /fluent-bit/etc/parsers.conf


# # Ros Topics
# [INPUT]
#     Name      http
#     Tag       ros.topics
#     Listen    0.0.0.0
#     Port      8888

# # ROS Topics → Postgres
# [OUTPUT]
#     Name      pgsql
#     Match     ros.topics
#     Host      postgres
#     Port      5432
#     User      postgres
#     Password  changeme
#     Database  robot_analytics
#     Table     topic_events
#     Connection_Options  -c statement_timeout=0
#     #storage.total_limit_size 100M
#     #Retry_Limit              10


# ROS 2 log files from ~/.ros/log/
[INPUT]
    Name              tail
    Tag               ros.logs
    Path              /ros-logs/**/*.log
    Path_Key          filename
    DB                /var/log/fluent-bit/storage/ros-logs.db
    multiline.parser  ros2_humble
    Read_From_Head    false
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    storage.type      filesystem

# All container stdout/stderr via Docker json-file logs
[INPUT]
    Name              tail
    Tag               container.logs
    Path              /var/lib/docker/containers/*/*.log
    Path_Key          source_file
    DB                /var/log/fluent-bit/storage/containers.db
    Parser            docker
    Read_From_Head    false
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    storage.type      filesystem

# Linux system journal (systemd)
[INPUT]
    Name              systemd
    Tag               system.journal
    DB                /var/log/fluent-bit/storage/systemd.db
    Read_From_Tail    On
    Strip_Underscores On
    storage.type      filesystem


# Resolve container ID → container name + labels via Docker API
[FILTER]
    Name    lua
    Match   container.logs
    script  /fluent-bit/scripts/container_name.lua
    call    extract_container_name

# Parse ROS 2 log lines into structured fields
[FILTER]
    Name         parser
    Match        ros.logs
    Key_Name     log
    Parser       ros2_humble_line
    Reserve_Data On

[FILTER]
    Name         parser
    Match        ros.logs
    Key_Name     log
    Parser       ros1_line
    Reserve_Data On


# ROS logs → Loki 
[OUTPUT]
    Name        loki
    Match       ros.logs
    Host        loki
    Port        3100
    Labels      job=ros-logs, source=ros-logs
    line_format json
    Retry_Limit 10

# Container stdout/stderr → Loki
[OUTPUT]
    Name        loki
    Match       container.logs
    Host        loki
    Port        3100
    Labels      job=robot-containers
    label_keys  $container_id
    line_format json
    Retry_Limit 10

# System journal → Loki 
[OUTPUT]
    Name        loki
    Match       system.journal
    Host        loki
    Port        3100
    Labels      job=system-journal, source=system-journal
    line_format json
    Retry_Limit 10